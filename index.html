<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>六相圆融 · 徒步角色抽签</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 16px; }

        /* ===== Header ===== */
        .header { text-align: center; padding: 24px 0 16px; }
        .header-icon { font-size: 44px; margin-bottom: 8px; animation: float 3s ease-in-out infinite; display: inline-block; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .header h1 { font-size: 26px; font-weight: 800; background: linear-gradient(90deg,#00d4ff,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom: 6px; }
        .header p { color: #94a3b8; font-size: 13px; }

        /* ===== Mode Tabs ===== */
        .mode-tabs { display: flex; gap: 8px; margin: 12px 0 16px; }
        .mode-tab { flex: 1; padding: 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; text-align: center; font-size: 13px; color: #94a3b8; cursor: pointer; transition: all .3s; }
        .mode-tab.active { background: linear-gradient(135deg,rgba(0,212,255,0.15),rgba(168,85,247,0.15)); border-color: rgba(0,212,255,0.4); color: #00d4ff; font-weight: 600; }

        /* ===== JOIN MODE ===== */
        .join-box {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px; padding: 20px; margin-bottom: 16px;
            position: relative; overflow: hidden;
        }
        .join-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #00d4ff, #a855f7, #00d4ff);
            background-size: 200% 100%; animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

        .join-title { font-size: 15px; color: #00d4ff; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .join-input-wrap { display: flex; gap: 10px; margin-bottom: 14px; }
        .join-input {
            flex: 1; padding: 14px 16px; background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 14px;
            color: #fff; font-size: 16px; outline: none;
        }
        .join-input:focus { border-color: #00d4ff; }
        .join-btn {
            padding: 14px 22px; background: linear-gradient(135deg,#00d4ff,#7c3aed);
            border: none; border-radius: 14px; color: #fff; font-size: 15px; font-weight: 700;
            cursor: pointer; white-space: nowrap; transition: all .2s;
        }
        .join-btn:active { transform: scale(0.96); }
        .join-btn:disabled { opacity: .4; cursor: not-allowed; }

        /* ===== Player List ===== */
        .player-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 48px; }
        .player-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 14px; background: rgba(0,212,255,0.12);
            border: 1px solid rgba(0,212,255,0.3); border-radius: 24px;
            font-size: 14px; color: #e2e8f0; animation: popIn .3s ease;
        }
        @keyframes popIn { from { opacity:0; transform: scale(.5)} to { opacity:1; transform: scale(1)} }
        .player-chip .num { width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(135deg,#00d4ff,#7c3aed); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
        .player-chip .remove { cursor: pointer; opacity: .6; font-size: 16px; margin-left: 2px; }
        .player-chip .remove:hover { opacity: 1; color: #ef4444; }

        .status-bar { display: flex; justify-content: space-between; align-items: center; }
        .status-text { font-size: 13px; color: #94a3b8; }
        .status-text b { color: #00d4ff; font-size: 18px; }
        .draw-big-btn {
            padding: 12px 28px; background: linear-gradient(135deg,#00d4ff,#7c3aed);
            border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: all .3s; position: relative; overflow: hidden;
        }
        .draw-big-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,212,255,0.25); }
        .draw-big-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }
        .draw-big-btn .pulse { position: absolute; inset: 0; border-radius: 12px; border: 2px solid rgba(0,212,255,0.5); animation: pulse-ring 1.5s infinite; }
        @keyframes pulse-ring { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(1.15);opacity:0} }

        /* ===== BATCH MODE (hidden by default) ===== */
        .batch-box { display: none; }
        .batch-box.show { display: block; animation: fadeIn .3s; }
        .batch-textarea {
            width: 100%; min-height: 140px; padding: 14px;
            background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px; color: #fff; font-size: 15px; resize: vertical;
            font-family: inherit; outline: none;
        }
        .batch-textarea:focus { border-color: #00d4ff; }
        .batch-textarea::placeholder { color: #475569; }

        /* ===== Shuffling ===== */
        .shuffling { text-align: center; padding: 50px 20px; display: none; }
        .shuffling.show { display: block; animation: fadeIn .4s; }
        .shuffle-emoji { font-size: 64px; display: inline-block; animation: shake .5s infinite; }
        @keyframes shake { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-12deg)scale(1.1)} 75%{transform:rotate(12deg)scale(1.1)} }
        .shuffle-text { margin-top: 20px; color: #00d4ff; font-size: 16px; font-weight: 600; }
        .shuffle-sub { margin-top: 8px; color: #64748b; font-size: 13px; }

        /* ===== Results ===== */
        .results { display: none; margin-top: 16px; }
        .results.show { display: block; animation: fadeInUp .5s; }
        @keyframes fadeInUp { from { opacity:0; transform: translateY(30px)} to { opacity:1; transform: translateY(0)} }
        .result-title { text-align: center; font-size: 20px; margin-bottom: 18px; color: #00d4ff; font-weight: 700; }

        .role-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 16px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 14px;
            opacity: 0; transform: translateX(-30px); transition: all .4s;
        }
        .role-card.visible { opacity: 1; transform: translateX(0); }
        .role-card:hover { border-color: rgba(0,212,255,0.3); background: rgba(255,255,255,0.08); }
        .role-icon {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; flex-shrink: 0;
        }
        .role-icon.ceo { background: linear-gradient(135deg,#f59e0b,#d97706); }
        .role-icon.director { background: linear-gradient(135deg,#3b82f6,#2563eb); }
        .role-icon.pm { background: linear-gradient(135deg,#10b981,#059669); }
        .role-icon.hrbp { background: linear-gradient(135deg,#ec4899,#db2777); }
        .role-icon.ops { background: linear-gradient(135deg,#8b5cf6,#7c3aed); }
        .role-icon.risk { background: linear-gradient(135deg,#ef4444,#dc2626); }
        .role-info { flex: 1; }
        .role-info h4 { font-size: 15px; margin-bottom: 2px; }
        .role-info .subtitle { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
        .role-info .person { font-size: 18px; font-weight: 800; color: #00d4ff; }
        .role-desc { font-size: 12px; color: #64748b; margin-top: 4px; line-height: 1.5; }

        .group-label { text-align: center; margin: 16px 0 10px; color: #a855f7; font-size: 13px; font-weight: 600; letter-spacing: 2px; }

        /* ===== Share Buttons ===== */
        .share-bar { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .share-btn {
            padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 600;
            cursor: pointer; border: none; transition: all .3s;
        }
        .share-btn.primary { background: linear-gradient(135deg,#00d4ff,#7c3aed); color: #fff; }
        .share-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,212,255,0.3); }
        .share-btn.ghost { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #cbd5e1; }
        .share-btn.ghost:hover { background: rgba(255,255,255,0.15); }

        /* ===== Roles Cheat Sheet ===== */
        .cheatsheet { margin-top: 24px; padding: 16px; background: rgba(255,255,255,0.04); border-radius: 14px; }
        .cheatsheet h3 { font-size: 14px; color: #00d4ff; margin-bottom: 10px; }
        .cheatsheet-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
        .cs-item { text-align: center; padding: 10px 4px; background: rgba(255,255,255,0.04); border-radius: 10px; font-size: 12px; }
        .cs-item .cs-emoji { font-size: 22px; display: block; margin-bottom: 3px; }
        .cs-item .cs-name { color: #e2e8f0; font-weight: 600; font-size: 11px; }
        .cs-item .cs-desc { color: #64748b; font-size: 10px; margin-top: 2px; }

        /* ===== Toast ===== */
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(0,0,0,0.85); color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; transition: all .3s; z-index: 1000; opacity: 0; border: 1px solid rgba(0,212,255,0.2); }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ===== Sparkles ===== */
        .sparkle { position: fixed; width: 4px; height: 4px; border-radius: 50%; background: #00d4ff; pointer-events: none; animation: sparkle 1s ease-out forwards; }
        @keyframes sparkle { 0%{transform:translate(0,0)scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty))scale(0);opacity:0} }

        .footer { text-align: center; padding: 24px 0 16px; color: #475569; font-size: 11px; }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="header-icon">🎲</div>
        <h1>六相圆融 · 徒步角色抽签</h1>
        <p>六人一队 · 各司其职 · 圆满登顶</p>
    </div>

    <!-- Mode Tabs -->
    <div class="mode-tabs">
        <div class="mode-tab active" onclick="switchMode('join')" id="tab-join">👤 逐人加入</div>
        <div class="mode-tab" onclick="switchMode('batch')" id="tab-batch">📋 批量导入</div>
    </div>

    <!-- JOIN MODE -->
    <div class="join-box" id="joinBox">
        <div class="join-title">📝 输入名字加入队伍</div>
        <div class="join-input-wrap">
            <input type="text" class="join-input" id="nameInput" placeholder="你的名字..." maxlength="12" autocomplete="off">
            <button class="join-btn" onclick="addPlayer()">➕ 加入</button>
        </div>

        <div class="player-list" id="playerList"></div>

        <div class="status-bar">
            <div class="status-text">已有 <b id="countNum">0</b> / 6 人</div>
            <button class="draw-big-btn" id="drawBtn" onclick="startDraw()" disabled>
                <span class="pulse" id="pulseRing" style="display:none"></span>
                ✨ 开始抽签
            </button>
        </div>
    </div>

    <!-- BATCH MODE -->
    <div class="batch-box" id="batchBox">
        <div class="join-box">
            <div class="join-title">📋 批量粘贴名单</div>
            <p style="font-size:12px;color:#64748b;margin-bottom:10px">每行一个名字，至少6人</p>
            <textarea class="batch-textarea" id="batchInput" placeholder="张三&#10;李四&#10;王五&#10;赵六&#10;钱七&#10;孙八"></textarea>
            <div class="status-bar" style="margin-top:14px">
                <div></div>
                <button class="draw-big-btn" onclick="startBatchDraw()">✨ 开始抽签</button>
            </div>
        </div>
    </div>

    <!-- Shuffling -->
    <div class="shuffling" id="shuffling">
        <div class="shuffle-emoji">🎲</div>
        <div class="shuffle-text">正在随机分配角色...</div>
        <div class="shuffle-sub" id="shuffleSub">六相圆融，各安其位</div>
    </div>

    <!-- Results -->
    <div class="results" id="results">
        <div class="result-title">🎉 抽签结果</div>
        <div id="resultsList"></div>
        <div class="share-bar">
            <button class="share-btn primary" onclick="copyResults()">📋 复制结果</button>
            <button class="share-btn ghost" onclick="resetAll()">🔄 再来一次</button>
        </div>
    </div>

    <!-- Roles Cheatsheet -->
    <div class="cheatsheet" id="cheatsheet">
        <h3>📖 六相角色速查</h3>
        <div class="cheatsheet-grid">
            <div class="cs-item"><span class="cs-emoji">👑</span><span class="cs-name">总相·CEO</span><span class="cs-desc">看全局、定方向</span></div>
            <div class="cs-item"><span class="cs-emoji">🛡️</span><span class="cs-name">别相·总监</span><span class="cs-desc">管安全物资财务</span></div>
            <div class="cs-item"><span class="cs-emoji">🎯</span><span class="cs-name">同相·PM</span><span class="cs-desc">拉会对齐进度</span></div>
            <div class="cs-item"><span class="cs-emoji">💝</span><span class="cs-name">异相·HRBP</span><span class="cs-desc">化解摩擦照顾人</span></div>
            <div class="cs-item"><span class="cs-emoji">📊</span><span class="cs-name">成相·运营</span><span class="cs-desc">盯结果做复盘</span></div>
            <div class="cs-item"><span class="cs-emoji">⚠️</span><span class="cs-name">坏相·风控</span><span class="cs-desc">看风险踩刹车</span></div>
        </div>
    </div>

    <div class="footer">
        六相圆融 · 协作原则：定方向 | 目标一致 | 冲终点防翻车 | 专业分工全局服从
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ROLES = [
    { key:'ceo', icon:'👑', name:'总相 · CEO', subtitle:'看全局的人', desc:'定小组目标、召集会议、关键时刻拍板、对外联络', gradient:'ceo' },
    { key:'director', icon:'🛡️', name:'别相 · 部门总监', subtitle:'各管一摊的人', desc:'安全线：把控节奏检查装备。物资线：管水食物药品。财务线：管公共开销AA记账', gradient:'director' },
    { key:'pm', icon:'🎯', name:'同相 · 项目经理', subtitle:'拉会对齐的人', desc:'早上对齐目标、中午check-in进度、晚上复盘、串联各角色防各干各的', gradient:'pm' },
    { key:'hrbp', icon:'💝', name:'异相 · HRBP', subtitle:'解决摩擦的人', desc:'关注体力差异、化解意见分歧、关注情绪变化、确保没人被落下', gradient:'hrbp' },
    { key:'ops', icon:'📊', name:'成相 · 运营', subtitle:'盯结果的人', desc:'盯结果达成、记录过程拍照拍视频、复盘总结、输出每日战报', gradient:'ops' },
    { key:'risk', icon:'⚠️', name:'坏相 · 风控/法务', subtitle:'喊刹车的人', desc:'识别天气路段身体风险、提前预警、该休息时硬撑、检查保险应急预案', gradient:'risk' }
];

let players = [];
let currentResults = [];

// ===== MODE SWITCH =====
function switchMode(mode) {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + mode).classList.add('active');
    if (mode === 'join') {
        document.getElementById('joinBox').style.display = 'block';
        document.getElementById('batchBox').classList.remove('show');
    } else {
        document.getElementById('joinBox').style.display = 'none';
        document.getElementById('batchBox').classList.add('show');
    }
}

// ===== JOIN MODE =====
function addPlayer() {
    const input = document.getElementById('nameInput');
    const name = input.value.trim();
    if (!name) { showToast('⚠️ 请输入名字'); return; }
    if (players.includes(name)) { showToast('⚠️ 该名字已加入'); return; }
    if (players.length >= 60) { showToast('⚠️ 最多60人'); return; }

    players.push(name);
    input.value = '';
    input.focus();
    renderPlayers();
    showToast(`✅ ${name} 已加入！`);
    createSparkles(window.innerWidth/2, window.innerHeight/2);
}

// Allow Enter key
document.getElementById('nameInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') addPlayer();
});

function removePlayer(idx) {
    players.splice(idx, 1);
    renderPlayers();
}

function renderPlayers() {
    const list = document.getElementById('playerList');
    list.innerHTML = players.map((p, i) => `
        <span class="player-chip">
            <span class="num">${i+1}</span>
            ${p}
            <span class="remove" onclick="removePlayer(${i})">×</span>
        </span>
    `).join('');

    const count = players.length;
    document.getElementById('countNum').textContent = count;
    const btn = document.getElementById('drawBtn');
    const pulse = document.getElementById('pulseRing');

    if (count >= 6) {
        btn.disabled = false;
        pulse.style.display = count % 6 === 0 ? 'block' : 'none';
    } else {
        btn.disabled = true;
        pulse.style.display = 'none';
    }
}

// ===== BATCH MODE =====
function startBatchDraw() {
    const input = document.getElementById('batchInput').value.trim();
    if (!input) { showToast('⚠️ 请输入名单'); return; }
    const names = input.split(/[\n,，]/).map(n => n.trim()).filter(n => n);
    if (names.length < 6) { showToast('⚠️ 至少需要6人'); return; }
    players = names;
    performDraw();
}

// ===== DRAW =====
function startDraw() {
    if (players.length < 6) { showToast('⚠️ 至少需要6人'); return; }
    performDraw();
}

function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function performDraw() {
    document.getElementById('results').classList.remove('show');
    document.getElementById('shuffling').classList.add('show');
    document.getElementById('joinBox').style.display = 'none';
    document.getElementById('batchBox').classList.remove('show');
    document.querySelector('.mode-tabs').style.display = 'none';
    document.getElementById('cheatsheet').style.display = 'none';

    setTimeout(() => {
        const shuffled = shuffleArray(players);
        const groups = [];
        for (let i = 0; i < shuffled.length; i += 6) {
            const g = shuffled.slice(i, i + 6);
            if (g.length === 6) {
                groups.push(ROLES.map((r, idx) => ({ ...r, person: g[idx] })));
            } else {
                // partial group
                groups.push(g.map((name, idx) => ({
                    icon: '👤', name: '候补队员', subtitle: '机动支援',
                    desc: '跟随队伍，随时补位支援各角色', gradient: 'director', person: name
                })));
            }
        }
        currentResults = groups;
        showResults(groups);
        document.getElementById('shuffling').classList.remove('show');
    }, 1800);
}

function showResults(groups) {
    const container = document.getElementById('resultsList');
    container.innerHTML = '';

    groups.forEach((group, gIdx) => {
        if (groups.length > 1) {
            const lbl = document.createElement('div');
            lbl.className = 'group-label';
            lbl.textContent = `—— 第 ${gIdx + 1} 组 ——`;
            container.appendChild(lbl);
        }
        group.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'role-card';
            card.innerHTML = `
                <div class="role-icon ${item.gradient}">${item.icon}</div>
                <div class="role-info">
                    <h4>${item.name}</h4>
                    <div class="subtitle">${item.subtitle}</div>
                    <div class="person">${item.person}</div>
                    <div class="role-desc">${item.desc}</div>
                </div>
            `;
            container.appendChild(card);
            setTimeout(() => card.classList.add('visible'), idx * 120);
        });
    });

    document.getElementById('results').classList.add('show');
}

// ===== COPY =====
function copyResults() {
    let text = '🎲 六相圆融 · 徒步角色抽签结果\n\n';
    currentResults.forEach((group, gIdx) => {
        if (currentResults.length > 1) text += `—— 第 ${gIdx+1} 组 ——\n`;
        group.forEach(item => {
            text += `${item.icon} ${item.name.replace(/ · /g,'·')} → ${item.person}\n`;
        });
        text += '\n';
    });
    text += '━━━━━━━━━━━━\n协作原则：定方向 | 目标一致 | 冲终点防翻车 | 专业分工全局服从';

    const copyFn = () => {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            return navigator.clipboard.writeText(text);
        }
        return Promise.reject();
    };
    copyFn().then(() => showToast('✅ 结果已复制，去微信群粘贴吧！'))
        .catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text; document.body.appendChild(ta);
            ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            showToast('✅ 结果已复制，去微信群粘贴吧！');
        });
}

// ===== RESET =====
function resetAll() {
    players = [];
    currentResults = [];
    document.getElementById('results').classList.remove('show');
    document.getElementById('resultsList').innerHTML = '';
    document.getElementById('joinBox').style.display = 'block';
    document.getElementById('batchBox').classList.remove('show');
    document.querySelector('.mode-tabs').style.display = 'flex';
    document.getElementById('cheatsheet').style.display = 'block';
    document.getElementById('playerList').innerHTML = '';
    document.getElementById('countNum').textContent = '0';
    document.getElementById('drawBtn').disabled = true;
    document.getElementById('pulseRing').style.display = 'none';
    document.getElementById('nameInput').value = '';
    document.getElementById('batchInput').value = '';
    switchMode('join');
    showToast('🔄 已重置，可以重新组队');
}

// ===== UTILS =====
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}

function createSparkles(x, y) {
    for (let i = 0; i < 10; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.style.left = x + 'px'; s.style.top = y + 'px';
        s.style.setProperty('--tx', (Math.random()-.5)*120 + 'px');
        s.style.setProperty('--ty', (Math.random()-.5)*120 + 'px');
        s.style.background = ['#00d4ff','#a855f7','#f59e0b','#10b981'][Math.floor(Math.random()*4)];
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1000);
    }
}
</script>
